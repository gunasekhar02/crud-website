<div class="login-container">
  <h1>Login</h1>
  <form (ngSubmit)="onLogin()">
    <input 
      type="text" 
      [(ngModel)]="username" 
      name="username" 
      placeholder="Username" 
      required
    >
    <input 
      type="password" 
      [(ngModel)]="password" 
      name="password" 
      placeholder="Password" 
      required
    >
    <button type="submit" [disabled]="isLoading">
      {{ isLoading ? 'Logging in...' : 'Login' }}
    </button>
  </form>
  <p *ngIf="error" class="error">{{ error }}</p>
  <p class="link-line">
    New user? <button type="button" class="link-button" (click)="goToRegister()">Register here</button>
  </p>
</div>
